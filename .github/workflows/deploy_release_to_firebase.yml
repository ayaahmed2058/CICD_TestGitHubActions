
name: Deploy Android APK to Firebase App Distribution

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest


  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Version
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ANDROID_KEYSTORE | base64 --decode > app/my-release-key.jks

      - name: Create service account file
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          echo "$CREDENTIAL_FILE_CONTENT" | base64 --decode > service-account.json

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          DATE=$(date +'%d-%m-%Y')
          NEW_NAME="App-${DATE}-V${VERSION_NAME}.apk"
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/$NEW_NAME
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/release/

      - name: Create release notes
        run: |
          echo "# Release v${VERSION_NAME}" > RELEASE_NOTES.md
          echo "- Build number: ${{ github.run_number }}" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- Date: $(date)" >> RELEASE_NOTES.md

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/release/$APK_NAME \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups "testers" \
            --release-notes "Version ${VERSION_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release v${{ env.VERSION_NAME }}
          files: app/build/outputs/apk/release/$APK_NAME