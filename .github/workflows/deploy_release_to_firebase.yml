name: Deploy Android APK to Firebase App Distribution

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo $ANDROID_KEYSTORE | base64 --decode > app/keystore.jks
          echo "Keystore created at: $(pwd)/app/keystore.jks"
          ls -la app/keystore.jks

      - name: Create service account file
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: echo $CREDENTIAL_FILE_CONTENT | base64 --decode > service-account.json

      - name: Verify service account file
        run: |
          if [ -f service-account.json ]; then
            echo "Service account file created successfully"
            echo "File size: $(wc -c service-account.json)"
          else
            echo "Service account file not found!"
            exit 1
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/keystore.jks
        run: |
          echo "Building with keystore: $KEYSTORE_FILE"
          ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "APK built successfully"
            ls -la app/build/outputs/apk/release/
          else
            echo "APK not found!"
            find . -name "*.apk" -type f
            exit 1
          fi

      - name: Create release notes
        run: |
          echo "# New Release v${{ github.run_number }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Updates:" >> RELEASE_NOTES.md
          echo "- New application version" >> RELEASE_NOTES.md
          echo "- Performance improvements" >> RELEASE_NOTES.md
          echo "- Bug fixes" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Build: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "Date: $(date)" >> RELEASE_NOTES.md

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Debug Firebase App ID
        run: |
          echo "Using Firebase App ID: ${{ secrets.FIREBASE_APP_ID }}"
          echo "App ID should start with: 1:"

      - name: Upload to Firebase App Distribution via CLI
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --testers "ayaahmed75383@gmail.com" \
            --release-notes "New Release v${{ github.run_number }}" \
            --debug

      - name: Fallback - Upload via GitHub Action (without groups)
        if: failure()
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: service-account.json
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: "New Release v${{ github.run_number }}"

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk